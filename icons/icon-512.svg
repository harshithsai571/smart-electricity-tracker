<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d4f4a"/>
      <stop offset="100%" stop-color="#0f8a7e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#082e2b"/>
      <stop offset="100%" stop-color="#0a3d39"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none"
        stroke="rgba(255,255,255,0.08)" stroke-width="5"/>

  <!-- Meter body -->
  <rect x="74" y="80" width="364" height="294" rx="42" fill="url(#screen)"/>
  <rect x="74" y="80" width="364" height="294" rx="42" fill="none"
        stroke="rgba(255,255,255,0.12)" stroke-width="4"/>

  <!-- Meter top bump -->
  <rect x="182" y="64" width="148" height="36" rx="18" fill="#0a3d39"/>
  <rect x="182" y="64" width="148" height="36" rx="18" fill="none"
        stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/>

  <!-- LCD display panel -->
  <rect x="106" y="120" width="300" height="96" rx="21" fill="#041e1c"/>
  <rect x="106" y="120" width="300" height="96" rx="21" fill="none"
        stroke="rgba(100,220,200,0.18)" stroke-width="2.5"/>

  <!-- 5 digit slots -->
  <!-- D1 -->
  <rect x="118" y="134" width="44" height="68" rx="8"  fill="#0d3330"/>
  <text x="140" y="183" font-family="'Courier New',monospace" font-size="46"
        font-weight="700" fill="#4dffd6" text-anchor="middle">8</text>
  <!-- D2 -->
  <rect x="168" y="134" width="44" height="68" rx="8"  fill="#0d3330"/>
  <text x="190" y="183" font-family="'Courier New',monospace" font-size="46"
        font-weight="700" fill="#4dffd6" text-anchor="middle">4</text>
  <!-- D3 -->
  <rect x="218" y="134" width="44" height="68" rx="8"  fill="#0d3330"/>
  <text x="240" y="183" font-family="'Courier New',monospace" font-size="46"
        font-weight="700" fill="#4dffd6" text-anchor="middle">7</text>
  <!-- D4 -->
  <rect x="268" y="134" width="44" height="68" rx="8"  fill="#0d3330"/>
  <text x="290" y="183" font-family="'Courier New',monospace" font-size="46"
        font-weight="700" fill="#4dffd6" text-anchor="middle">2</text>
  <!-- D5 -->
  <rect x="318" y="134" width="44" height="68" rx="8"  fill="#0d3330"/>
  <text x="340" y="183" font-family="'Courier New',monospace" font-size="46"
        font-weight="700" fill="#4dffd6" text-anchor="middle">1</text>

  <!-- kWh label -->
  <text x="372" y="182" font-family="'Segoe UI',Arial,sans-serif" font-size="22"
        font-weight="700" fill="rgba(100,220,200,0.55)" text-anchor="start">kWh</text>

  <!-- Scale tick marks -->
  <line x1="118" y1="240" x2="118" y2="262" stroke="rgba(255,255,255,0.28)" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="240" x2="160" y2="256" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linecap="round"/>
  <line x1="202" y1="240" x2="202" y2="256" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linecap="round"/>
  <line x1="244" y1="240" x2="244" y2="264" stroke="rgba(255,255,255,0.32)" stroke-width="4" stroke-linecap="round"/>
  <line x1="286" y1="240" x2="286" y2="256" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linecap="round"/>
  <line x1="328" y1="240" x2="328" y2="256" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="240" x2="370" y2="262" stroke="rgba(255,255,255,0.28)" stroke-width="4" stroke-linecap="round"/>

  <!-- Arc -->
  <path d="M 118 268 Q 256 220 394 268" fill="none"
        stroke="rgba(77,255,214,0.2)" stroke-width="4"/>

  <!-- Status LEDs -->
  <circle cx="132"  cy="300" r="9"  fill="#22c55e" opacity="0.9"/>
  <circle cx="162"  cy="300" r="9"  fill="#f59e0b" opacity="0.7"/>
  <circle cx="390"  cy="300" r="9"  fill="#4dffd6" opacity="0.8"/>

  <!-- ENERGY METER label -->
  <text x="256" y="338" font-family="'Segoe UI',Arial,sans-serif" font-size="21"
        font-weight="600" fill="rgba(255,255,255,0.32)" text-anchor="middle"
        letter-spacing="4">ENERGY METER</text>

  <!-- Corner screws -->
  <circle cx="106" cy="354" r="11" fill="#0a3d39" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
  <circle cx="406" cy="354" r="11" fill="#0a3d39" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>

  <!-- Lightning bolt (glowing, bottom-right) -->
  <g filter="url(#glow)" transform="translate(264 368) scale(2.4)">
    <polygon points="28,-2 8,26 20,26 4,54 36,18 22,18"
             fill="#facc15" opacity="0.95"/>
  </g>

  <!-- Ground bar -->
  <rect x="74" y="406" width="364" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>

  <!-- Analytics bars (bottom) -->
  <rect x="100" y="427" width="22" height="54"  rx="6"  fill="rgba(77,255,214,0.28)"/>
  <rect x="130" y="414" width="22" height="67"  rx="6"  fill="rgba(77,255,214,0.42)"/>
  <rect x="160" y="432" width="22" height="49"  rx="6"  fill="rgba(77,255,214,0.28)"/>
  <rect x="190" y="400" width="22" height="81"  rx="6"  fill="rgba(77,255,214,0.6)"/>
  <rect x="220" y="420" width="22" height="61"  rx="6"  fill="rgba(77,255,214,0.38)"/>
  <rect x="250" y="408" width="22" height="73"  rx="6"  fill="rgba(77,255,214,0.5)"/>
  <rect x="280" y="418" width="22" height="63"  rx="6"  fill="rgba(77,255,214,0.4)"/>
</svg>
